<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc" />
      <stop offset="100%" stop-color="#0099ff" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b131a" />
      <stop offset="100%" stop-color="#05080c" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle (Metallic Glass) -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" stroke="rgba(0, 255, 204, 0.15)" stroke-width="4" />
  
  <!-- Ambient Inner Glow Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#neon-grad)" stroke-width="2" opacity="0.2" />
  
  <!-- Outer Radio Sound Waves (Concentric Dashed Arcs) -->
  <path d="M 120 256 A 136 136 0 0 1 392 256" fill="none" stroke="url(#neon-grad)" stroke-width="4" stroke-dasharray="10 15" opacity="0.6" stroke-linecap="round" />
  <path d="M 80 256 A 176 176 0 0 1 432 256" fill="none" stroke="url(#neon-grad)" stroke-width="3" stroke-dasharray="5 15" opacity="0.3" stroke-linecap="round" />

  <!-- Headphones Arc -->
  <path d="M 176 256 A 80 80 0 0 1 336 256" fill="none" stroke="url(#neon-grad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Headphone Ear Pads -->
  <rect x="156" y="236" width="20" height="50" rx="8" fill="url(#neon-grad)" />
  <rect x="336" y="236" width="20" height="50" rx="8" fill="url(#neon-grad)" />

  <!-- Play Button (Center) -->
  <polygon points="236,226 296,256 236,286" fill="url(#neon-grad)" filter="url(#glow)" />

  <!-- Equalizer Bars at the bottom inside headphones -->
  <g transform="translate(206, 315)" fill="url(#neon-grad)" opacity="0.8">
    <rect x="0" y="5" width="6" height="20" rx="3" />
    <rect x="12" y="10" width="6" height="15" rx="3" />
    <rect x="24" y="0" width="6" height="25" rx="3" />
    <rect x="36" y="8" width="6" height="17" rx="3" />
    <rect x="48" y="12" width="6" height="13" rx="3" />
    <rect x="60" y="4" width="6" height="21" rx="3" />
    <rect x="72" y="7" width="6" height="18" rx="3" />
    <g transform="scale(-1, 1) translate(-94, 0)">
      <!-- Symmetrical or varied visual bars -->
    </g>
  </g>

  <!-- Typography / Brand Name -->
  <text x="256" y="390" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="4">
    JRB
  </text>
  <text x="256" y="420" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#00ffcc" text-anchor="middle" letter-spacing="6" opacity="0.9">
    WEB RADIO
  </text>
</svg>
